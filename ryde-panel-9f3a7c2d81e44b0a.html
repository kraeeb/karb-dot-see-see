<!DOCTYPE html>
<html lang="en">
<head> <!-- stole this vibecoded slop -->
    <link rel="icon" type="image/png" href="rydehax.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>HeilHitlerNineUnlock3000</title>

    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#0A0F1E;font-family:'Inter',sans-serif;padding:20px;display:flex;justify-content:center;align-items:center;min-height:100vh;}
        .card{max-width:550px;width:100%;background:#12182C;border-radius:32px;padding:24px;border:1px solid #2A3A60;}
        h1{font-size:26px;background:linear-gradient(135deg,#FFF,#22D3EE);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:20px;}
        .status{background:#03060E;border-radius:20px;padding:12px;margin-bottom:20px;display:flex;justify-content:space-between;}
        .led{width:12px;height:12px;border-radius:50%;background:#475569;display:inline-block;margin-right:8px;}
        .led.active{background:#10B981;}
        .log{background:#00000080;border-radius:20px;height:180px;overflow-y:auto;padding:12px;font-family:monospace;font-size:11px;color:#A0B4E0;margin:16px 0;}
        .charbox{
            background:#00000080;
            border-radius:20px;
            height:160px;
            overflow-y:auto;
            padding:12px;
            font-family:monospace;
            font-size:11px;
            color:#A0B4E0;
            margin-top:10px;
        }
        .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0;}
        button{background:#1E2A4A;border:none;padding:12px;border-radius:40px;color:white;font-weight:600;cursor:pointer;}
        button.primary{background:#2563EB;}
        input{width:100%;padding:12px;background:#030712;border:1px solid #334155;border-radius:40px;color:#00FFFF;font-family:monospace;margin:8px 0;}
        .note{font-size:11px;color:#6B7280;text-align:center;margin-top:20px;}
        .flex{display:flex;gap:8px;}
    </style>
</head>

<body>
<div class="card">

    <h1>HeilHitlerNineUnlock3000</h1>

    <div class="status">
        <div>
            <span class="led" id="statusLed"></span>
            <span id="statusText">Disconnected</span>
        </div>
        <span id="deviceName">—</span>
    </div>

    <div class="log" id="logPanel">
        Trykk skann, deretter velg BLE-enheten din.
    </div>

    <div class="flex">
        <button id="scanBtn" class="primary">Skann</button>
        <button id="disconnectBtn">Disconnect</button>
    </div>

    <div class="grid">
        <button id="unlockBtn" disabled>Lås opp</button>
        <button id="lockBtn" disabled>Lås</button>
        <button id="batteryOnBtn" disabled>Aktiver Batteri</button>
        <button id="batteryOffBtn" disabled>Deaktiver Batteri</button>
        <button id="speedUpBtn" disabled>Øk Farten</button>
        <button id="speedDownBtn" disabled>Senk Farten</button>
    </div>

    <input type="text" id="rawHex" placeholder="Hexkommando">
    <button id="sendRawBtn" disabled>Send råkommando</button>

    <!-- NEW: characteristic list -->
    <div class="charbox" id="charList">
        [Characteristics will appear here]
    </div>

</div>

<script>

let device = null;
let characteristic = null;

const statusLed = document.getElementById('statusLed');
const statusText = document.getElementById('statusText');
const deviceNameSpan = document.getElementById('deviceName');
const logPanel = document.getElementById('logPanel');

function addLog(msg, err=false){
    logPanel.innerHTML += `\n[${new Date().toLocaleTimeString()}] ${err?'❌':'✅'} ${msg}`;
    logPanel.scrollTop = logPanel.scrollHeight;
}

function setConnected(conn){
    ['unlockBtn','lockBtn','batteryOnBtn','batteryOffBtn','speedUpBtn','speedDownBtn','sendRawBtn']
    .forEach(id => document.getElementById(id).disabled = !conn);

    if(conn){
        statusLed.classList.add('active');
        statusText.innerText = 'Connected';
    } else {
        statusLed.classList.remove('active');
        statusText.innerText = 'Disconnected';
        deviceNameSpan.innerText = '—';
        characteristic = null;
        device = null;
    }
}

async function sendHex(hex){
    if(!characteristic){
        addLog('Ingen Tilkobling',1);
        return false;
    }

    try{
        let clean = hex.replace(/\s/g,'');
        if(clean.length%2) throw new Error('Odd length');

        let bytes = new Uint8Array(clean.match(/.{1,2}/g).map(b=>parseInt(b,16)));

        await characteristic.writeValue(bytes);

        addLog(`📤 Sent: ${hex.toUpperCase()}`);
        return true;

    } catch(e){
        addLog(`Error: ${e.message}`,1);
        return false;
    }
}

async function scanAndConnect(){
    if(!navigator.bluetooth){
        addLog('Web BLE ikke støttet',1);
        return;
    }

    try{
        addLog('Skanner...');

        let selected = await navigator.bluetooth.requestDevice({
            acceptAllDevices: true,
            optionalServices: ['generic_access','generic_attribute']
        });

        deviceNameSpan.innerText = selected.name || '?';

        let server = await selected.gatt.connect();

        addLog('Tilkoblet! Leser services...');

        let services = await server.getPrimaryServices();

        let list = document.getElementById('charList');
        list.innerHTML = '';

        characteristic = null;

        for(let service of services){
            let chars = await service.getCharacteristics();

            for(let c of chars){

                let props = [];
                if(c.properties.read) props.push('read');
                if(c.properties.write) props.push('write');
                if(c.properties.writeWithoutResponse) props.push('writeNoRsp');
                if(c.properties.notify) props.push('notify');

                let div = document.createElement('div');
                div.style.padding = '6px';
                div.style.borderBottom = '1px solid #2A3A60';
                div.style.cursor = 'pointer';

                div.innerHTML = `
                    <b>${c.uuid}</b><br>
                    <span style="color:#6B7280;font-size:10px;">
                        ${props.join(', ') || 'no props'}
                    </span>
                `;

                div.onclick = () => {
                    characteristic = c;
                    addLog('Selected: ' + c.uuid);
                };

                list.appendChild(div);
            }
        }

        addLog('Velg karakteristikk fra listen');
        setConnected(true);

    } catch(e){
        addLog(`Error: ${e.message}`,1);
        setConnected(false);
    }
}

async function disconnect(){
    if(device && device.gatt.connected){
        await device.gatt.disconnect();
    }
    setConnected(false);
    addLog('Disconnected');
}

document.getElementById('scanBtn').onclick = scanAndConnect;
document.getElementById('disconnectBtn').onclick = disconnect;

document.getElementById('unlockBtn').onclick = ()=>sendHex('55 05 05 00 5F');
document.getElementById('lockBtn').onclick = ()=>sendHex('55 05 05 00 60');
document.getElementById('batteryOnBtn').onclick = ()=>sendHex('55 09 0B 00 01');
document.getElementById('batteryOffBtn').onclick = ()=>sendHex('55 09 0B 00 02');
document.getElementById('speedUpBtn').onclick = ()=>sendHex('55 09 07 00 1E');
document.getElementById('speedDownBtn').onclick = ()=>sendHex('55 09 07 00 0F');

document.getElementById('sendRawBtn').onclick = ()=>{
    let cmd = document.getElementById('rawHex').value.trim();
    if(cmd) sendHex(cmd);
    else addLog('Enter HEX',1);
};

if(!navigator.bluetooth)
    addLog('Web BLE ikke støttet',1);
else
    addLog('Klar. Trykk skann.');

</script>
</body>
</html>
